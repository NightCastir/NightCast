name: Update NightCast Feed

on:

  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:


jobs:

  update-feed:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout repository

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.x"



    - name: Update Social Feed

      run: |

        python .github/scripts/update_feed.py



    - name: Commit and Push Changes

      run: |

        git config --global user.name "NightCast Bot"

        git config --global user.email "bot@nightcast.ir"


        git add data/social-feed.json


        git commit -m "Auto update NightCast feed" || exit 0


        git push

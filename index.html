<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightCast | لینک‌های رسمی</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:#171717;
border:2px solid #caa548;
border-radius:22px;
padding:30px;
box-shadow:0 0 35px rgba(202,165,72,.35);
text-align:center;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #d4af37;
margin-bottom:15px;
}

h1{
color:#d4af37;
margin-bottom:8px;
}

.desc{
color:#ddd;
margin-bottom:25px;
line-height:1.8;
}

.item{
background:#222;
border:1px solid #444;
border-radius:14px;
margin:12px 0;
padding:14px;
}

.title{
color:#d4af37;
font-weight:bold;
margin-bottom:10px;
}

.buttons{
display:flex;
gap:10px;
}

button,a{
flex:1;
text-decoration:none;
border:none;
border-radius:10px;
padding:11px;
cursor:pointer;
font-size:15px;
transition:.3s;
}

.enter{
background:#d4af37;
color:#111;
font-weight:bold;
}

.copy{
background:#333;
color:#fff;
}

.enter:hover{
background:#f5cb54;
}

.copy:hover{
background:#555;
}

footer{
margin-top:25px;
color:#999;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo" alt="NightCast">

<h1>NightCast</h1>

<p class="desc">
همه شبکه‌های اجتماعی و راه‌های ارتباطی NightCast
</p>

<div class="item">
<div class="title">Instagram</div>
<div class="buttons">
<a class="enter" target="_blank"
href="https://www.instagram.com/NightCast.ir">ورود</a>
<button class="copy" onclick="copyLink('https://www.instagram.com/NightCast.ir')">کپی لینک</button>
</div>
</div>

<div class="item">
<div class="title">Eitaa</div>
<div class="buttons">
<a class="enter" target="_blank"
href="https://eitaa.com/NightCast">ورود</a>
<button class="copy" onclick="copyLink('https://eitaa.com/NightCast')">کپی لینک</button>
</div>
</div>

<div class="item">
<div class="title">Bale</div>
<div class="buttons">
<a class="enter" target="_blank"
href="https://ble.ir/NightCast_ir">ورود</a>
<button class="copy" onclick="copyLink('https://ble.ir/NightCast_ir')">کپی لینک</button>
</div>
</div>

<div class="item">
<div class="title">SPlus</div>
<div class="buttons">
<a class="enter" target="_blank"
href="https://splus.ir/NightCast">ورود</a>
<button class="copy" onclick="copyLink('https://splus.ir/NightCast')">کپی لینک</button>
</div>
</div>

<div class="item">
<div class="title">YouTube</div>
<div class="buttons">
<a class="enter" target="_blank"
href="https://www.youtube.com/@NightCast-r5e">ورود</a>
<button class="copy" onclick="copyLink('https://www.youtube.com/@NightCast-r5e')">کپی لینک</button>
</div>
</div>

<footer>
© NightCast
</footer>

</div>

<script>
function copyLink(link){
navigator.clipboard.writeText(link).then(function(){
alert("لینک کپی شد ✅");
});
}
</script>

</body>
</html>

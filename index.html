<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NightCast</title><style>
body{background:#111;color:#fff;font-family:tahoma,sans-serif;display:flex;justify-content:center;padding:20px}.card{max-width:430px;width:100%;background:#1b1b1b;border:2px solid #d4af37;border-radius:18px;padding:24px}.logo{width:120px;height:120px;border-radius:50%;display:block;margin:0 auto 15px;border:3px solid #d4af37}.item{background:#262626;padding:12px;border-radius:10px;margin:10px 0}.t{color:#d4af37;font-weight:bold;margin-bottom:8px}.b{display:flex;gap:8px}a,button{flex:1;padding:10px;border-radius:8px;border:0;text-decoration:none;cursor:pointer}.go{background:#d4af37;color:#000}.cp{background:#444;color:#fff}
</style></head><body><div class="card"><img class="logo" src="logo.png"><h2>NightCast</h2><p>همه شبکه‌های اجتماعی</p>
<script>
function add(n,u){document.write(`<div class=item><div class=t>${n}</div><div class=b><a class=go target=_blank href="${u}">ورود</a><button class=cp onclick="navigator.clipboard.writeText('${u}');alert('لینک کپی شد')">کپی لینک</button></div></div>`)}
</script>
<script>
add("Instagram","https://www.instagram.com/NightCast.ir");
add("Eitaa","https://eitaa.com/NightCast");
add("Bale","https://ble.ir/NightCast_ir");
add("Rubika","https://rubika.ir/NightCast_ir");
add("SPlus","https://splus.ir/NightCast");
add("Telegram","https://t.me/NightCast_ir");
add("YouTube","https://www.youtube.com/@NightCast-r5e");
</script></div></body></html>

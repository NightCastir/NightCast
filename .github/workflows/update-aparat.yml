name: Update NightCast Aparat Feed

on:

  schedule:

    # هر ۶ ساعت

    - cron: "0 */6 * * *"


  workflow_dispatch:



permissions:

  contents: write



jobs:


  update-feed:


    runs-on: ubuntu-latest


    steps:


      - name: Checkout repository

        uses: actions/checkout@v4



      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.x"



      - name: Install dependencies

        run: |

          pip install requests beautifulsoup4



      - name: Update Aparat JSON

        run: |

          python scripts/update_aparat.py



      - name: Commit changes

        run: |


          git config --global user.name "NightCast Bot"

          git config --global user.email "actions@github.com"


          git add data/aparat.json


          git commit -m "Update Aparat feed" || exit 0


          git push
